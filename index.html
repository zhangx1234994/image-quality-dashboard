<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>图片处理质量看板</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .filters {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filter-item input:focus,
        .filter-item select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-meta {
            font-size: 12px;
            opacity: 0.9;
        }

        .card-body {
            padding: 20px;
        }

        .image-compare {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .main-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .sub-tasks-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
        }

        .sub-tasks-header {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sub-task-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .image-item {
            position: relative;
        }

        .image-number {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .image-section {
            text-align: center;
        }

        .image-label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .image-wrapper {
            position: relative;
            background: #f7fafc;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            transition: border-color 0.3s;
        }

        .image-wrapper:hover {
            border-color: #667eea;
        }

        .image-wrapper img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            font-size: 14px;
        }

        .details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .detail-label {
            color: #718096;
        }

        .detail-value {
            color: #2d3748;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-pending {
            background: #feebc8;
            color: #7c2d12;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 10px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 图片处理质量看板</h1>
            <div class="stats">
                <div class="stat-card">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">总处理数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="successCount">0</div>
                    <div class="label">成功数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="userCount">0</div>
                    <div class="label">用户数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="actionTypes">0</div>
                    <div class="label">操作类型</div>
                </div>
            </div>
        </div>

        <!-- 质量趋势区域 -->
        <div class="trends" style="background: white; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
            <h2 style="color: #4a5568; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                📈 质量趋势分析
                <span style="font-size: 12px; color: #718096;">基于筛选条件的质量变化趋势</span>
            </h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <!-- 质量评分 -->
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <div style="font-size: 36px; font-weight: bold; margin-bottom: 5px;">87.2</div>
                    <div style="font-size: 14px; opacity: 0.9;">平均质量评分</div>
                    <div style="font-size: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
                        <span style="color: #48bb78;">▲ 5.2%</span>
                        <span>较上周提升</span>
                    </div>
                </div>
                
                <!-- 成功 rate -->
                <div style="background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <div style="font-size: 36px; font-weight: bold; margin-bottom: 5px;">92.5%</div>
                    <div style="font-size: 14px; opacity: 0.9;">成功完成率</div>
                    <div style="font-size: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
                        <span style="color: #48bb78;">▲ 2.8%</span>
                        <span>较上周提升</span>
                    </div>
                </div>
                
                <!-- 平均处理时间 -->
                <div style="background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <div style="font-size: 36px; font-weight: bold; margin-bottom: 5px;">12.3s</div>
                    <div style="font-size: 14px; opacity: 0.9;">平均处理时间</div>
                    <div style="font-size: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
                        <span style="color: #48bb78;">▼ 15.6%</span>
                        <span>较上周缩短</span>
                    </div>
                </div>
                
                <!-- 质量分布 -->
                <div style="background: linear-gradient(135deg, #9f7aea 0%, #805ad5 100%); color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <div style="font-size: 36px; font-weight: bold; margin-bottom: 5px;">65/25/10</div>
                    <div style="font-size: 14px; opacity: 0.9;">质量分布</div>
                    <div style="font-size: 12px; margin-top: 10px; opacity: 0.8;">
                        优质/一般/问题
                    </div>
                </div>
            </div>
            

        </div>

        <div class="filters">
            <div class="filter-row">
                <div class="filter-item">
                    <label>用户ID</label>
                    <input type="text" id="userFilter" placeholder="输入用户ID筛选">
                </div>
                <div class="filter-item">
                    <label>操作类型</label>
                    <select id="actionFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>状态</label>
                    <select id="statusFilter">
                        <option value="">全部</option>
                        <option value="2">成功</option>
                        <option value="3">失败</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>开始日期</label>
                    <input type="date" id="startDateFilter">
                </div>
                <div class="filter-item">
                    <label>结束日期</label>
                    <input type="date" id="endDateFilter">
                </div>
                <div class="filter-item" style="display: flex; flex-direction: column; gap: 8px; justify-content: flex-end;">
                    <button class="btn" onclick="loadData()">🔍 搜索</button>
                    <button class="btn" onclick="clearFilters()" style="background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);">🗑️ 清空</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">正在加载数据...</div>
        <div id="gallery" class="gallery"></div>
        <div id="noData" class="no-data" style="display: none;">
            暂无数据
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img id="modalImage" src="" alt="预览">
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let allData = [];
        let currentOffset = 0;
        let isLoading = false;
        let hasMoreData = true;
        const limit = 10;
        const statusMap = {
            '1': '处理中',
            '2': '成功',
            '3': '失败'
        };

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const result = await response.json();
                
                if (result.success) {
                    const { total, success, users, actions } = result.data;
                    document.getElementById('totalCount').textContent = total;
                    document.getElementById('successCount').textContent = success;
                    document.getElementById('userCount').textContent = users;
                    document.getElementById('actionTypes').textContent = actions;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载操作类型选项
        async function loadActions() {
            try {
                const response = await fetch(`${API_BASE}/actions`);
                const result = await response.json();
                
                if (result.success) {
                    const actionFilter = document.getElementById('actionFilter');
                    actionFilter.innerHTML = '<option value="">全部</option>';
                    
                    result.data.forEach(action => {
                        const option = document.createElement('option');
                        option.value = action.value;
                        option.textContent = action.label;
                        actionFilter.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载操作类型失败:', error);
            }
        }

        // 加载任务数据
        async function loadData() {
            // 重置分页状态
            currentOffset = 0;
            allData = [];
            hasMoreData = true;
            
            const loading = document.getElementById('loading');
            const gallery = document.getElementById('gallery');
            const noData = document.getElementById('noData');
            
            loading.style.display = 'block';
            gallery.innerHTML = '';
            noData.style.display = 'none';

            // 加载第一页数据
            await loadMoreData();
            
            loading.style.display = 'none';
        }

        // 加载更多数据（用于分页和无限滚动）
        async function loadMoreData() {
            // 如果正在加载或没有更多数据，则返回
            if (isLoading || !hasMoreData) return;
            
            isLoading = true;
            
            try {
                // 获取筛选条件
                const userFilter = document.getElementById('userFilter').value;
                const actionFilter = document.getElementById('actionFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;
                const startDateFilter = document.getElementById('startDateFilter').value;
                const endDateFilter = document.getElementById('endDateFilter').value;

                // 构建查询参数
                const params = new URLSearchParams();
                if (userFilter) params.append('user_id', userFilter);
                if (actionFilter) params.append('action', actionFilter);
                if (statusFilter) params.append('status', statusFilter);
                if (startDateFilter) params.append('start_date', startDateFilter);
                if (endDateFilter) {
                    // 添加结束日期的23:59:59，确保包含当天的所有数据
                    params.append('end_date', new Date(endDateFilter + 'T23:59:59').toISOString());
                }
                params.append('limit', limit);
                params.append('offset', currentOffset);

                const response = await fetch(`${API_BASE}/tasks?${params}`);
                const result = await response.json();
                
                if (result.success) {
                    const newData = result.data;
                    
                    // 如果没有新数据，标记为没有更多数据
                    if (newData.length === 0) {
                        hasMoreData = false;
                        // 如果是第一次加载且没有数据，显示无数据提示
                        if (allData.length === 0) {
                            document.getElementById('noData').style.display = 'block';
                        }
                        return;
                    }
                    
                    // 添加新数据
                    allData = [...allData, ...newData];
                    
                    // 更新偏移量
                    currentOffset += newData.length;
                    
                    // 如果返回的数据少于请求的数量，标记为没有更多数据
                    if (newData.length < limit) {
                        hasMoreData = false;
                    }
                    
                    // 显示数据（如果是第一次加载则清空现有数据，否则追加）
                    if (currentOffset === newData.length) {
                        displayCards(allData);
                    } else {
                        appendCards(newData);
                    }
                } else {
                    throw new Error(result.message);
                }
                
            } catch (error) {
                console.error('加载数据失败:', error);
                // 如果是第一次加载失败，显示错误信息
                if (allData.length === 0) {
                    document.getElementById('loading').innerHTML = `加载失败: ${error.message}<br><br>请确保后端服务已启动 (npm start)`;
                    document.getElementById('loading').style.display = 'block';
                }
            } finally {
                isLoading = false;
            }
        }

        // 清空所有筛选条件
        function clearFilters() {
            document.getElementById('userFilter').value = '';
            document.getElementById('actionFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('startDateFilter').value = '';
            document.getElementById('endDateFilter').value = '';
            loadData(); // 清空后重新加载数据
        }

        // 显示卡片（清空现有内容）
        function displayCards(data) {
            const gallery = document.getElementById('gallery');
            const noData = document.getElementById('noData');
            
            if (data.length === 0) {
                noData.style.display = 'block';
                return;
            }

            gallery.innerHTML = '';
            appendCards(data);
        }

        // 追加卡片（不清空现有内容）
        function appendCards(data) {
            const gallery = document.getElementById('gallery');
            const noData = document.getElementById('noData');
            
            noData.style.display = 'none';
            
            data.forEach(item => {
                const card = createCard(item);
                gallery.appendChild(card);
            });
        }

        // 无限滚动监听
        window.addEventListener('scroll', () => {
            // 检查是否滚动到页面底部附近
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
                loadMoreData();
            }
        });

        // 创建卡片 - 优化版,增强质量评估功能
        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';

            const originalImages = item.originalImages || [];
            const resultImages = item.resultImages || [];

            const statusClass = item.status == 2 ? 'status-success' : 
                              item.status == 3 ? 'status-error' : 'status-pending';

            // 计算处理时长
            let processingTime = '-';
            if (item.started_at && item.finished_at) {
                const start = new Date(item.started_at);
                const end = new Date(item.finished_at);
                const duration = Math.round((end - start) / 1000);
                processingTime = `${duration}秒`;
            }

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <span class="quality-indicator">🎯</span>
                        子任务 #${item.id} - ${item.actionLabel || item.action}
                        <span class="sub-task-badge">SubTaskID: ${item.sub_task_id}</span>
                    </div>
                    <div class="card-meta">
                        用户: ${item.user_id.substring(0, 12)}... | 
                        ${formatDate(item.created_at)}
                        ${resultImages.length > 0 ? ` | 生成 ${resultImages.length} 张图` : ''}
                        ${processingTime !== '-' ? ` | 耗时: ${processingTime}` : ''}
                    </div>
                </div>
                <div class="card-body">
                    <!-- 质量评估栏 -->
                    <div class="quality-evaluation" style="margin-bottom: 20px; padding: 12px; background: #f7fafc; border-radius: 8px; border-left: 4px solid #667eea;">
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 14px;">
                            <div>
                                <strong>质量评估:</strong> <span style="color: #667eea; font-weight: 500;">待评估</span>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button onclick="markQuality('${item.id}', 'good')" style="background: #c6f6d5; color: #22543d; border: none; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;">👍 优质</button>
                                <button onclick="markQuality('${item.id}', 'normal')" style="background: #feebc8; color: #7c2d12; border: none; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;">⚡ 一般</button>
                                <button onclick="markQuality('${item.id}', 'bad')" style="background: #fed7d7; color: #742a2a; border: none; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;">👎 问题</button>
                            </div>
                        </div>
                    </div>

                    <!-- 图片对比区域 -->
                    <div class="image-compare">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
                            <!-- 原图区域 -->
                            <div>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                    <div class="image-label">原图 <span style="color: #667eea; font-size: 12px;">(${originalImages.length})</span></div>
                                    <div style="background: #e6fffa; color: #004c40; padding: 2px 8px; border-radius: 12px; font-size: 11px;">参考图</div>
                                </div>
                                ${originalImages.length > 0 ? 
                                    originalImages.map((img, idx) => `
                                        <div class="image-wrapper" onclick="openModal('${img}')" style="margin-bottom: 10px; border: 2px solid #667eea;">
                                            <img src="${img}" alt="原图 ${idx + 1}" onerror="this.parentElement.innerHTML='<div class=image-placeholder>加载失败</div>'">
                                        </div>
                                    `).join('') :
                                    '<div class="image-placeholder">暂无原图</div>'
                                }
                            </div>

                            <!-- 生成结果区域 -->
                            <div>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                    <div class="image-label">生成结果 <span style="color: #764ba2; font-size: 12px;">(${resultImages.length})</span></div>
                                    <div style="background: #faf5ff; color: #553c9a; padding: 2px 8px; border-radius: 12px; font-size: 11px;">待评估</div>
                                </div>
                                ${resultImages.length > 0 ? 
                                    resultImages.map((img, idx) => `
                                        <div class="image-wrapper" onclick="openModal('${img}')" style="margin-bottom: 10px; border: 2px solid #764ba2;">
                                            <img src="${img}" alt="结果图 ${idx + 1}" onerror="this.parentElement.innerHTML='<div class=image-placeholder>加载失败</div>'">
                                            <div style="position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px;">#${idx + 1}</div>
                                        </div>
                                    `).join('') :
                                    '<div class="image-placeholder">暂无生成图</div>'
                                }
                            </div>
                        </div>
                    </div>

                    <!-- 任务详情 -->
                    <div class="details">
                        <div class="detail-row">
                            <span class="detail-label">处理状态:</span>
                            <span class="status-badge ${statusClass}">
                                ${statusMap[item.status] || '未知'}
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">开始时间:</span>
                            <span class="detail-value">${formatDateTime(item.started_at)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">完成时间:</span>
                            <span class="detail-value">${formatDateTime(item.finished_at)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">处理时长:</span>
                            <span class="detail-value">${processingTime}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">主任务ID:</span>
                            <span class="detail-value" style="font-family: monospace; font-size: 12px; word-break: break-all;">${item.task_id}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">操作类型:</span>
                            <span class="detail-value" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px;">
                                ${item.actionLabel || item.action}
                            </span>
                        </div>
                        ${item.error_message ? `
                        <div class="detail-row">
                            <span class="detail-label">错误信息:</span>
                            <span class="detail-value" style="color: #e53e3e; font-size: 12px; word-break: break-word;">${item.error_message}</span>
                        </div>
                        ` : ''}
                    </div>

                    <!-- 问题标记 -->
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0;">
                        <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #4a5568;">问题标记:</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            <button onclick="tagIssue('${item.id}', '模糊')" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;">模糊</button>
                            <button onclick="tagIssue('${item.id}', '变形')" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;">变形</button>
                            <button onclick="tagIssue('${item.id}', '颜色偏差')" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;">颜色偏差</button>
                            <button onclick="tagIssue('${item.id}', '内容缺失')" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;">内容缺失</button>
                            <button onclick="tagIssue('${item.id}', '其他')" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;">其他</button>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr || dateStr === 'null') return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr || dateStr === 'null') return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        // 打开图片预览
        function openModal(imageSrc) {
            if (!imageSrc) return;
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageSrc;
            modal.classList.add('active');
        }

        // 关闭图片预览
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
        }

        // 质量评估函数
        function markQuality(taskId, quality) {
            // 这里可以实现质量评估的本地存储或后端API调用
            // 目前只做前端反馈
            alert(`已标记任务 #${taskId} 质量: ${quality === 'good' ? '优质' : quality === 'normal' ? '一般' : '问题'}`);
            // 可以进一步实现UI上的视觉反馈
        }

        // 问题标记函数
        function tagIssue(taskId, issueType) {
            // 这里可以实现问题标记的本地存储或后端API调用
            // 目前只做前端反馈
            alert(`已标记任务 #${taskId} 问题: ${issueType}`);
            // 可以进一步实现UI上的视觉反馈
        }

        // 页面加载时自动加载数据
        window.onload = function() {
            loadStats();
            loadActions();
            loadData();
        };
    </script>
</body>
</html>
